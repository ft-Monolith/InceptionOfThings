apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jgavairo-app
  namespace: argocd
spec:
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: http://gitlab-webservice-default.gitlab.svc.cluster.local:8181/root/jgavairo-app.git
    targetRevision: HEAD
    path: app
  syncPolicy:
    automated:
      selfHeal: true
      prune: true

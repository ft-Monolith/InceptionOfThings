apiVersion: apps/v1
kind: Deployment
metadata:
  name: jgavairo-app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jgavairo-app
  template:
    metadata:
      labels:
        app: jgavairo-app
    spec:
      containers:
      - name: jgavairo-container
        image: wil42/playground:v1
        ports:
        - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: jgavairo-app-service
  namespace: dev
spec:
  selector:
    app: jgavairo-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8888 